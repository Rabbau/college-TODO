name: college-todo
services:

  db:
    image: postgres
    restart: always
    container_name: college_todo_db
    # set shared memory limit when using docker compose
    shm_size: 128mb
    ports:
      - '5556:5432'
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      # Postgres 18+ expects mounting at /var/lib/postgresql (see image docs/logs)
      - college_todo_pgdata:/var/lib/postgresql

  app:
    build: .
    container_name: college_todo_app
    depends_on:
      - db
    ports:
      - '8000:8000'
    restart: always
    env_file:
      - .env
    volumes:
      - notes_data:/app/notes

volumes:
  college_todo_pgdata:
  notes_data:
