name: college-todo
services:

  db:
    image: postgres
    restart: always
    container_name: college_todo_db
    # set shared memory limit when using docker compose
    shm_size: 128mb
    ports:
      - '5556:5432'
    environment:
      POSTGRES_PASSWORD: POSTGRES_PASSWORD
      POSTGRES_USER: postgres
      POSTGRES_DB: todo
    volumes:
      # Postgres 18+ expects mounting at /var/lib/postgresql (see image docs/logs)
      - college_todo_pgdata:/var/lib/postgresql

volumes:
  college_todo_pgdata:
